<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矿工大亨 - 放置点击游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 顶部状态栏 */
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* 主游戏区域 */
        .game-area {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .game-area {
                grid-template-columns: 1fr;
            }
        }
        
        /* 挖矿区域 */
        .mine-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        
        .mine-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #ffd700, #ff8c00, #ff4500);
            box-shadow: 
                0 10px 30px rgba(255,215,0,0.4),
                inset 0 -10px 30px rgba(0,0,0,0.3),
                0 0 60px rgba(255,215,0,0.2);
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }
        
        .mine-btn:hover {
            transform: scale(1.05);
        }
        
        .mine-btn:active {
            transform: scale(0.95);
            box-shadow: 
                0 5px 15px rgba(255,215,0,0.4),
                inset 0 -5px 20px rgba(0,0,0,0.3);
        }
        
        .mine-btn::after {
            content: '⛏️';
            font-size: 80px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .mine-btn-text {
            margin-top: 20px;
            font-size: 18px;
            color: #ccc;
        }
        
        /* 点击特效容器 */
        .click-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        
        .click-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.5);
            }
        }
        
        /* 升级面板 */
        .upgrade-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
        }
        
        .panel-title {
            font-size: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .upgrade-item {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .upgrade-item:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,215,0,0.3);
        }
        
        .upgrade-item.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .upgrade-info h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .upgrade-info p {
            font-size: 12px;
            color: #aaa;
        }
        
        .upgrade-cost {
            text-align: right;
        }
        
        .cost-value {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .cost-label {
            font-size: 11px;
            color: #888;
        }
        
        .owned {
            font-size: 12px;
            color: #4ade80;
            margin-top: 5px;
        }
        
        /* 成就系统 */
        .achievements {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
        }
        
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }
        
        .achievement {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .achievement.unlocked {
            background: rgba(255,215,0,0.2);
            border: 1px solid #ffd700;
        }
        
        .achievement-icon {
            font-size: 30px;
            margin-bottom: 5px;
        }
        
        .achievement-name {
            font-size: 10px;
            color: #aaa;
        }
        
        .achievement.unlocked .achievement-name {
            color: #ffd700;
        }
        
        /* 底部提示 */
        .footer {
            margin-top: 20px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
        
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            border: 2px solid #ffd700;
        }
        
        .modal h2 {
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .modal p {
            margin-bottom: 20px;
            color: #ccc;
        }
        
        .modal-btn {
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #1a1a2e;
            transition: all 0.2s;
        }
        
        .modal-btn:hover {
            transform: scale(1.05);
        }
        
        /* 离线收益 */
        .offline-earnings {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            z-index: 3000;
            display: none;
        }
        
        .offline-earnings.show {
            display: block;
            animation: popIn 0.3s ease-out;
        }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .offline-amount {
            font-size: 36px;
            color: #ffd700;
            font-weight: bold;
            margin: 15px 0;
        }
        
        /* 每日奖励 */
        .daily-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            color: #1a1a2e;
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 5px 20px rgba(255,215,0,0.4); }
            50% { box-shadow: 0 5px 30px rgba(255,215,0,0.8); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部状态 -->
        <div class="header">
            <div class="title">⛏️ 矿工大亨</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">金币</div>
                    <div class="stat-value" id="gold">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">每秒收益</div>
                    <div class="stat-value" id="gps">0/s</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">点击收益</div>
                    <div class="stat-value" id="click-power">1</div>
                </div>
            </div>
        </div>
        
        <!-- 游戏区域 -->
        <div class="game-area">
            <!-- 挖矿区域 -->
            <div class="mine-section">
                <button class="mine-btn" id="mineBtn"></button>
                <p class="mine-btn-text">点击挖掘黄金！</p>
            </div>
            
            <!-- 升级面板 -->
            <div class="upgrade-panel">
                <h3 class="panel-title">🛠️ 升级</h3>
                <div id="upgrades"></div>
            </div>
        </div>
        
        <!-- 成就系统 -->
        <div class="achievements">
            <h3 class="panel-title">🏆 成就</h3>
            <div class="achievement-grid" id="achievements"></div>
        </div>
        
        <div class="footer">
            游戏加载完成 | © 2026 矿工大亨
        </div>
    </div>
    
    <!-- 离线收益弹窗 -->
    <div class="offline-earnings" id="offlineModal">
        <h2>🎉 欢迎回来！</h2>
        <p>离线期间收益</p>
        <div class="offline-amount" id="offlineAmount">0</div>
        <p>金币</p>
        <button class="modal-btn" onclick="closeOfflineModal()">收下！</button>
    </div>
    
    <!-- 每日奖励按钮 -->
    <button class="daily-btn" id="dailyBtn" onclick="claimDaily()">
        🎁 每日奖励
    </button>
    
    <div class="click-effects" id="clickEffects"></div>

    <script>
        // ========== 游戏数据 ==========
        let gameData = {
            gold: 0,
            totalGold: 0,
            clickPower: 1,
            goldPerSecond: 0,
            lastSave: Date.now(),
            upgrades: {},
            achievements: {},
            dailyClaimed: false,
            dailyTime: 0
        };
        
        // 升级配置
        const upgradeConfig = [
            { id: 'pickaxe', name: '更好的镐子', desc: '点击伤害+1', baseCost: 15, costMult: 1.5, effect: () => { gameData.clickPower += 1; } },
            { id: 'miner', name: '雇佣矿工', desc: '每秒+1金币', baseCost: 50, costMult: 1.4, effect: () => { gameData.goldPerSecond += 1; } },
            { id: 'drill', name: '钻探机', desc: '每秒+5金币', baseCost: 500, costMult: 1.5, effect: () => { gameData.goldPerSecond += 5; } },
            { id: 'mine', name: '购买矿洞', desc: '每秒+20金币', baseCost: 3000, costMult: 1.6, effect: () => { gameData.goldPerSecond += 20; } },
            { id: 'factory', name: '黄金工厂', desc: '每秒+100金币', baseCost: 20000, costMult: 1.7, effect: () => { gameData.goldPerSecond += 100; } },
            { id: 'bank', name: '黄金银行', desc: '每秒+500金币', baseCost: 150000, costMult: 1.8, effect: () => { gameData.goldPerSecond += 500; } },
            { id: 'alchemy', name: '炼金术', desc: '点击+10金币', baseCost: 10000, costMult: 2, effect: () => { gameData.clickPower += 10; } }
        ];
        
        // 成就配置
        const achievementConfig = [
            { id: 'first_gold', name: '第一桶金', icon: '💰', req: 100 },
            { id: 'thousand', name: '千元户', icon: '💵', req: 1000 },
            { id: '10k', name: '万元户', icon: '🏆', req: 10000 },
            { id: '100k', name: '十万', icon: '👑', req: 100000 },
            { id: 'million', name: '百万富翁', icon: '🎰', req: 1000000 },
            { id: 'click_100', name: '点击百次', icon: '👆', req: 100, type: 'clicks' },
            { id: 'click_1000', name: '千次点击', icon: '🖱️', req: 1000, type: 'clicks' },
            { id: 'upgrade_5', name: '升级5次', icon: '⬆️', req: 5, type: 'upgrades' },
            { id: 'offline', name: '离线收益', icon: '🌙', req: 1000, type: 'offline' },
            { id: 'daily_7', name: '坚持7天', icon: '📅', req: 7, type: 'daily' }
        ];
        
        let totalClicks = 0;
        let totalUpgrades = 0;
        
        // ========== 初始化 ==========
        function init() {
            loadGame();
            checkOfflineEarnings();
            renderUpgrades();
            renderAchievements();
            setupEventListeners();
            startGameLoop();
            updateDisplay();
        }
        
        // 加载存档
        function loadGame() {
            const saved = localStorage.getItem('minerTycoon');
            if (saved) {
                const data = JSON.parse(saved);
                gameData = { ...gameData, ...data };
                totalClicks = gameData.totalClicks || 0;
                totalUpgrades = gameData.totalUpgrades || 0;
            }
        }
        
        // 保存存档
        function saveGame() {
            gameData.lastSave = Date.now();
            gameData.totalClicks = totalClicks;
            gameData.totalUpgrades = totalUpgrades;
            localStorage.setItem('minerTycoon', JSON.stringify(gameData));
        }
        
        // 离线收益计算
        function checkOfflineEarnings() {
            const now = Date.now();
            const offlineTime = (now - gameData.lastSave) / 1000; // 秒
            if (offlineTime > 60 && gameData.goldPerSecond > 0) {
                const earnings = Math.floor(offlineTime * gameData.goldPerSecond * 0.5); // 50% offline efficiency
                if (earnings > 0) {
                    gameData.gold += earnings;
                    gameData.totalGold += earnings;
                    document.getElementById('offlineAmount').textContent = formatNumber(earnings);
                    document.getElementById('offlineModal').classList.add('show');
                    checkAchievements('offline', earnings);
                }
            }
        }
        
        function closeOfflineModal() {
            document.getElementById('offlineModal').classList.remove('show');
        }
        
        // ========== 渲染 ==========
        function renderUpgrades() {
            const container = document.getElementById('upgrades');
            container.innerHTML = upgradeConfig.map(u => {
                const owned = gameData.upgrades[u.id] || 0;
                const cost = Math.floor(u.baseCost * Math.pow(u.costMult, owned));
                const canAfford = gameData.gold >= cost;
                
                return `
                    <div class="upgrade-item ${canAfford ? '' : 'locked'}" onclick="buyUpgrade('${u.id}')">
                        <div class="upgrade-info">
                            <h4>${u.name}</h4>
                            <p>${u.desc}</p>
                            <div class="owned">已购买: ${owned}</div>
                        </div>
                        <div class="upgrade-cost">
                            <div class="cost-value">${formatNumber(cost)}</div>
                            <div class="cost-label">💰</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderAchievements() {
            const container = document.getElementById('achievements');
            container.innerHTML = achievementConfig.map(a => {
                const unlocked = gameData.achievements[a.id];
                let progress = 0;
                
                if (a.type === 'clicks') {
                    progress = totalClicks;
                } else if (a.type === 'upgrades') {
                    progress = totalUpgrades;
                } else if (a.type === 'daily') {
                    progress = gameData.dailyStreak || 0;
                } else if (a.type === 'offline') {
                    progress = gameData.maxOffline || 0;
                } else {
                    progress = gameData.totalGold;
                }
                
                return `
                    <div class="achievement ${unlocked ? 'unlocked' : ''}" 
                         title="${a.name}: ${Math.min(progress, a.req)}/${a.req}">
                        <div class="achievement-icon">${a.icon}</div>
                        <div class="achievement-name">${a.name}</div>
                    </div>
                `;
            }).join('');
        }
        
        // ========== 游戏逻辑 ==========
        function clickMine(e) {
            const goldGain = gameData.clickPower;
            gameData.gold += goldGain;
            gameData.totalGold += goldGain;
            totalClicks++;
            
            // 点击特效
            createClickEffect(e.clientX, e.clientY, `+${formatNumber(goldGain)}`);
            
            // 检查成就
            checkAchievements('click', goldGain);
            checkAchievements('click_100', totalClicks, 'clicks');
            checkAchievements('click_1000', totalClicks, 'clicks');
            
            updateDisplay();
            renderUpgrades();
            renderAchievements();
        }
        
        function createClickEffect(x, y, text) {
            const container = document.getElementById('clickEffects');
            const el = document.createElement('div');
            el.className = 'click-text';
            el.textContent = text;
            el.style.left = (x - 20 + Math.random() * 40) + 'px';
            el.style.top = (y - 20 + Math.random() * 40) + 'px';
            container.appendChild(el);
            
            setTimeout(() => el.remove(), 1000);
        }
        
        function buyUpgrade(id) {
            const upgrade = upgradeConfig.find(u => u.id === id);
            const owned = gameData.upgrades[id] || 0;
            const cost = Math.floor(upgrade.baseCost * Math.pow(upgrade.costMult, owned));
            
            if (gameData.gold >= cost) {
                gameData.gold -= cost;
                gameData.upgrades[id] = owned + 1;
                totalUpgrades++;
                
                upgrade.effect();
                
                checkAchievements('upgrade_5', totalUpgrades, 'upgrades');
                
                saveGame();
                updateDisplay();
                renderUpgrades();
                renderAchievements();
            }
        }
        
        function checkAchievements(id, value, type = 'gold') {
            const ach = achievementConfig.find(a => a.id === id);
            if (!ach || gameData.achievements[id]) return;
            
            const threshold = type === 'gold' ? ach.req : ach.req;
            if (value >= threshold) {
                gameData.achievements[id] = true;
                showNotification(`🏆 解锁成就: ${ach.name}`);
                saveGame();
                renderAchievements();
            }
        }
        
        function showNotification(msg) {
            // 简单实现：可以在此添加更复杂的通知
            console.log(msg);
        }
        
        // 每日奖励
        function claimDaily() {
            const now = Date.now();
            const dayMs = 24 * 60 * 60 * 1000;
            
            if (now - gameData.dailyTime < dayMs && gameData.dailyClaimed) {
                showNotification('今日奖励已领取！');
                return;
            }
            
            const reward = 100 + (gameData.dailyStreak || 0) * 50;
            gameData.gold += reward;
            gameData.totalGold += reward;
            gameData.dailyClaimed = true;
            gameData.dailyTime = now;
            gameData.dailyStreak = (gameData.dailyStreak || 0) + 1;
            
            showNotification(`🎁 每日奖励: +${formatNumber(reward)} 金币！`);
            checkAchievements('daily_7', gameData.dailyStreak, 'daily');
            
            saveGame();
            updateDisplay();
        }
        
        // ========== 游戏循环 ==========
        function startGameLoop() {
            setInterval(() => {
                if (gameData.goldPerSecond > 0) {
                    gameData.gold += gameData.goldPerSecond;
                    gameData.totalGold += gameData.goldPerSecond;
                    updateDisplay();
                    renderUpgrades();
                }
            }, 1000);
            
            // 自动保存
            setInterval(saveGame, 30000);
        }
        
        function updateDisplay() {
            document.getElementById('gold').textContent = formatNumber(gameData.gold);
            document.getElementById('gps').textContent = formatNumber(gameData.goldPerSecond) + '/s';
            document.getElementById('click-power').textContent = formatNumber(gameData.clickPower);
        }
        
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return Math.floor(num).toString();
        }
        
        function setupEventListeners() {
            document.getElementById('mineBtn').addEventListener('click', clickMine);
        }
        
        // 启动游戏
        init();
    </script>
</body>
</html>
